<script>
// Cache-buster: redirect med timestamp hvis ikke allerede gjort
(function() {
  const url = new URL(window.location.href);
  if (!url.searchParams.get('v')) {
    url.searchParams.set('v', Date.now());
    window.location.replace(url.toString());
  }
})();

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    --red: #d0021b;
    --bg: #f5f6f8;
    --surface: #ffffff;
    --surface2: #f0f2f5;
    --border: #e2e6ed;
    --text: #1a2030;
    --muted: #7a8394;
    --green: #16a34a;

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }

    align-items: center;

  .logo-sep { color: var(--border); font-weight: 300; font-size: 18px; line-height: 1; }
  .logo span { color: var(--text); font-weight: 600; font-size: 13px; letter-spacing: .02em; text-transform: none; }
  .nav-tabs { display: flex; gap: 6px; }
  .nav-tab {

  .preset-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }

    padding: 6px 8px; font-family: var(--sans); font-size: 9px; font-weight: 700;

  .checkbox-row {

  .gtm-section { padding: 16px 20px; }

    background: var(--surface2); border: 1px solid var(--border);

  .info-box p { font-size: 11px; color: var(--muted); line-height: 1.6; }
  .link { color: var(--blue); text-decoration: none; font-size: 11px; }

</style>

<div id="auth-screen" style="
  position:fixed; inset:0; z-index:9999;
  background:#f5f6f8;
  display:flex; align-items:center; justify-content:center;
  font-family:'Inter',sans-serif;
">
  <div style="
    background:#fff; border:1px solid #e2e6ed;
    border-radius:12px; padding:40px 48px;
    box-shadow:0 8px 32px rgba(0,0,0,.08);
    width:100%; max-width:360px; text-align:center;
  ">
    <div style="font-size:13px;font-weight:800;letter-spacing:.08em;color:#d0021b;text-transform:uppercase;margin-bottom:4px">UPPIT</div>
    <div style="font-size:18px;font-weight:700;color:#1a2030;margin-bottom:6px">LeadPop Hub</div>
    <div style="font-size:13px;color:#7a8394;margin-bottom:28px">Skriv inn passord for å fortsette</div>
    <input id="auth-input" type="password" placeholder="Passord" style="
      width:100%; padding:10px 14px; font-size:14px;
      border:1px solid #e2e6ed; border-radius:8px;
      font-family:'Inter',sans-serif; outline:none;
      margin-bottom:12px; box-sizing:border-box;
      transition:border-color .15s;
    " />
    <div id="auth-error" style="font-size:12px;color:#d0021b;margin-bottom:10px;min-height:18px;"></div>
    <button id="auth-btn" style="
      width:100%; padding:10px; font-size:14px; font-weight:600;
      background:#d0021b; color:#fff; border:none; border-radius:8px;
      cursor:pointer; font-family:'Inter',sans-serif;
      transition:filter .15s;
    ">Logg inn</button>
  </div>
</div>

<div id="root" style="display:none"></div>

<script>
(function() {
  const PASS_HASH = '21b9321d90d9276edda0d5bf0ea816eb3f82c98b70ce3f71c4394fb5c19b0e1e';

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  // Sjekk om allerede autentisert i denne sesjonen
  if (sessionStorage.getItem('lp_auth') === '1') {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('root').style.display = '';
    return;
  }

  async function attempt() {
    const val = document.getElementById('auth-input').value;
    const hash = await sha256(val);
    if (hash === PASS_HASH) {
      sessionStorage.setItem('lp_auth', '1');
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('root').style.display = '';
    } else {
      document.getElementById('auth-error').textContent = 'Feil passord, prøv igjen';
      document.getElementById('auth-input').value = '';
      document.getElementById('auth-input').focus();
    }
  }

  document.getElementById('auth-btn').addEventListener('click', attempt);
  document.getElementById('auth-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') attempt();
    document.getElementById('auth-error').textContent = '';
  });
  document.getElementById('auth-btn').addEventListener('mouseover', function() { this.style.filter='brightness(.85)'; });
  document.getElementById('auth-btn').addEventListener('mouseout', function() { this.style.filter=''; });
})();
</script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const SUPABASE_URL = 'https://shurydpxamkasgsyeupe.supabase.co';
const SUPABASE_KEY = 'sb_publishable_8VEQPBuMuiVsrCch2ODP_Q_9gxUgulB';

// ─── FETCH STATS ────────────────────────────────────────
async function fetchEventStats() {
  try {
    const r = await fetch(
      SUPABASE_URL + '/rest/v1/popup_events?select=client_id,event_type&limit=5000',
      { headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY } }
    );
    const rows = await r.json();
    // Aggregate: { 'acusto.no': { opened: 5, closed: 3, submitted: 2 }, ... }
    const stats = {};
    rows.forEach(row => {
      if (!stats[row.client_id]) stats[row.client_id] = { opened: 0, closed: 0, submitted: 0 };
      if (stats[row.client_id][row.event_type] !== undefined) {
        stats[row.client_id][row.event_type]++;
      }
    });
    return stats;
  } catch(e) { return {}; }
}

// ─── Helpers ────────────────────────────────────────────
function shadeColor(hex, pct) {
  try {
    const num = parseInt(hex.replace('#',''), 16);
    const r = Math.min(255, Math.max(0, (num >> 16) + pct));
    const g = Math.min(255, Math.max(0, ((num >> 8) & 0xff) + pct));
    const b = Math.min(255, Math.max(0, (num & 0xff) + pct));
    return '#' + ((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1);
  } catch { return hex; }
}
function isLight(hex) {
  try {
    const n = parseInt(hex.replace('#',''), 16);
    return ((n>>16)*299 + ((n>>8)&0xff)*587 + (n&0xff)*114) / 1000 > 128;
  } catch { return false; }
}
function clientColor(id) {
  const map = { 'acusto.no':'#d0021b', 'smartorg.no':'#7c3aed', 'guleholmen.no':'#0369a1', 'regnmedmax.no':'#16a34a' };
  if (map[id]) return map[id];
  let hash = 0;
  for (let c of (id||'')) hash = ((hash << 5) - hash) + c.charCodeAt(0);
  const colors = ['#d0021b','#7c3aed','#0369a1','#16a34a','#ea580c','#0891b2'];
  return colors[Math.abs(hash) % colors.length];
}
function fmtDate(d) {
  return new Date(d).toLocaleString('nb-NO',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
}

// ─── Popup Preview ──────────────────────────────────────
function PopupPreview({ config }) {
  const bg = config.bgColor, primary = config.primaryColor;
  const light = isLight(bg);

  // Tekstfarger basert på bakgrunn
  const textColor = light ? '#1a1a2e' : '#e8ecf0';
  const subColor  = light ? '#64748b' : '#9aa3af';

  // Input og border: på lyse bakgrunner bruker vi faste mørke farger, på mørke bruker vi shade
  const inputBg   = light ? '#f1f5f9' : shadeColor(bg, -18);
  const borderCol = light ? '#cbd5e1' : shadeColor(bg, 30);
  const inputText = light ? '#334155' : subColor;

  const LABELS = { name:'Navn *', company:'Bedrift', phone:'Telefon', email:'E-post *' };
  return (
    <div className="popup-preview" style={{ background: bg, border: `1px solid ${borderCol}`, borderTop: `3px solid ${primary}` }}>
      <div style={{ position:'absolute', top:10, right:10, width:26, height:26, border:`1px solid ${borderCol}`, display:'flex', alignItems:'center', justifyContent:'center', color:subColor, fontSize:13, borderRadius:0, cursor:'pointer' }}>✕</div>
      <div style={{ padding:'32px 32px 28px', fontFamily:"'Inter',sans-serif" }}>
        <div style={{ fontSize:9, fontWeight:700, letterSpacing:'.18em', textTransform:'uppercase', color:primary, marginBottom:10 }}>{config.label||'Ta kontakt'}</div>
        <h2 style={{ fontSize:18, fontWeight:800, textTransform:'uppercase', color:textColor, lineHeight:1.15, margin:'0 0 8px' }}>{config.heading||'Overskrift'}</h2>
        <p style={{ fontSize:11, color:subColor, lineHeight:1.6, margin:'0 0 16px' }}>{config.subtext||'Undertekst'}</p>
        {config.fields.map(f => (
          <div key={f} style={{ marginBottom:7 }}>
            <div style={{ width:'100%', background:inputBg, border:`1px solid ${borderCol}`, color:inputText, fontSize:11, padding:'9px 12px' }}>{LABELS[f]||f}</div>
          </div>
        ))}
        <div style={{ width:'100%', background:primary, color:'#fff', fontSize:10, fontWeight:700, letterSpacing:'.14em', textTransform:'uppercase', padding:'11px 16px', marginTop:8, textAlign:'center' }}>{config.buttonText||'Send'} →</div>
        <div style={{ fontSize:9, color:subColor, marginTop:9 }}>Vi deler aldri informasjonen din med tredjeparter.</div>
      </div>
    </div>
  );
}

// ─── GTM code generator ─────────────────────────────────
function makeGTM(config, clientId) {
  const lines = [];
  lines.push('<script>');
  lines.push('window.LeadPopConfig = {');
  if (clientId)              lines.push(`  clientId:     '${clientId}',`);
  if (config.sheetsUrl)      lines.push(`  sheetsUrl:    '${config.sheetsUrl}',`);
  lines.push(`  heading:      '${config.heading}',`);
  lines.push(`  subtext:      '${config.subtext}',`);
  lines.push(`  buttonText:   '${config.buttonText}',`);
  lines.push(`  label:        '${config.label}',`);
  lines.push(`  successTitle: '${config.successTitle}',`);
  lines.push(`  successText:  '${config.successText}',`);
  if (config.successRedirectUrl) lines.push(`  successRedirectUrl: '${config.successRedirectUrl}',`);
  lines.push(`  primaryColor: '${config.primaryColor}',`);
  lines.push(`  bgColor:      '${config.bgColor}',`);
  lines.push(`  fields:       ${JSON.stringify(config.fields)},`);
  lines.push(`  cookieDays:   ${config.cookieDays}`);
  lines.push('}');
  lines.push('<\/script>');
  lines.push('<script src="https://uppitmarketing.github.io/leadpop/leadpop.js"><\/script>');
  lines.push('<script>LeadPop.show();<\/script>');
  return lines.join('\n');
}

// ─── Copy button ────────────────────────────────────────
function CopyBtn({ text }) {
  const [ok, setOk] = useState(false);
  return (
    <button className={`copy-btn${ok?' copied':''}`} onClick={() => {
      navigator.clipboard.writeText(text).then(() => { setOk(true); setTimeout(()=>setOk(false),2000); });
    }}>{ok ? '✓ Kopiert!' : 'Kopier GTM-kode'}</button>
  );
}

function useCustomers() {
  const [customers, setCustomers] = useState([]);
  const [loading, setLoading] = useState(true);

  const HEADERS = {
    apikey: SUPABASE_KEY,
    Authorization: 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
    Prefer: 'return=representation',
  };

  // Last inn kunder fra Supabase ved oppstart
  useEffect(() => {
    fetch(SUPABASE_URL + '/rest/v1/customers?order=created_at.asc', { headers: HEADERS })
      .then(r => r.json())
      .then(rows => {
        // Konverter fra Supabase-format til lokalt format
        const mapped = rows.map(r => ({
          id: r.id,
          name: r.name,
          domain: r.domain,
          config: r.config || {},
          updatedAt: r.updated_at,
        }));
        setCustomers(mapped);
      })
      .catch(() => {})
      .finally(() => setLoading(false));
  }, []);

  const addCustomer = async (name, domain) => {
    const nc = {
      id: Date.now().toString(),
      name,
      domain,
      config: { ...EMPTY_CONFIG, clientId: domain },
      updated_at: new Date().toISOString(),
      created_at: new Date().toISOString(),
    };
    const res = await fetch(SUPABASE_URL + '/rest/v1/customers', {
      method: 'POST',
      headers: HEADERS,
      body: JSON.stringify(nc),
    });
    if (res.ok) {
      const [saved] = await res.json();
      setCustomers(c => [...c, { id: saved.id, name: saved.name, domain: saved.domain, config: saved.config || {}, updatedAt: saved.updated_at }]);
    }
  };

  const updateCustomer = async (id, config) => {
    const updated_at = new Date().toISOString();
    await fetch(SUPABASE_URL + '/rest/v1/customers?id=eq.' + id, {
      method: 'PATCH',
      headers: HEADERS,
      body: JSON.stringify({ config, updated_at }),
    });
    setCustomers(c => c.map(x => x.id === id ? { ...x, config, updatedAt: updated_at } : x));
  };

  const deleteCustomer = async (id) => {
    await fetch(SUPABASE_URL + '/rest/v1/customers?id=eq.' + id, {
      method: 'DELETE',
      headers: HEADERS,
    });
    setCustomers(c => c.filter(x => x.id !== id));
  };

  return { customers, loading, addCustomer, updateCustomer, deleteCustomer };
}

        <div className="builder-tabs" style={{ position:'relative' }}>
          {saveStatus === 'saving' && (
            <span style={{ position:'absolute', top:8, right:8, fontSize:11, color:'#94a3b8' }}>Lagrer…</span>
          )}
          {saveStatus === 'saved' && (
            <span style={{ position:'absolute', top:8, right:8, fontSize:11, color:'#16a34a', fontWeight:600 }}>✓ Lagret</span>
          )}
          {['design','tekst','integrasjon'].map(t => (
            <button key={t} className={`builder-tab${btab===t?' active':''}`} onClick={()=>setBtab(t)}>{t}</button>
          ))}
        </div>

        <div className="builder-form">

          {btab === 'design' && <>
            <div {...grp}>
              <label className="field-label">Preset</label>
              <div className="preset-grid">
                {PRESETS.map(p => (
                  <button key={p.name} className="preset-btn"
                    style={{ background:p.bgColor, borderColor:p.primaryColor, color:'#fff' }}
                    onClick={() => { upd('primaryColor',p.primaryColor); upd('bgColor',p.bgColor); }}>
                    {p.name}
                  </button>
                ))}
              </div>
            </div>

            <div {...grp}>
              <label className="field-label">Primærfarge</label>
              <div className="color-row">
                <input type="color" value={config.primaryColor} onChange={e=>upd('primaryColor',e.target.value)} />
                <input {...inp} type="text" value={config.primaryColor} onChange={e=>upd('primaryColor',e.target.value)} style={{ flex:1 }} />
              </div>
            </div>

            <div {...grp}>
              <label className="field-label">Bakgrunnsfarge</label>
              <div className="color-row">
                <input type="color" value={config.bgColor} onChange={e=>upd('bgColor',e.target.value)} />
                <input {...inp} type="text" value={config.bgColor} onChange={e=>upd('bgColor',e.target.value)} style={{ flex:1 }} />
              </div>
            </div>

            <div {...grp}>
              <label className="field-label">Skjemafelt</label>
              {FIELD_OPTIONS.map(f => (
                <div key={f.key} className={`checkbox-row${config.fields.includes(f.key)?' checked':''}`}
                  onClick={()=>toggleField(f.key)}>
                  <input type="checkbox" checked={config.fields.includes(f.key)} onChange={()=>toggleField(f.key)} />
                  <span style={{ fontSize:12 }}>{f.label}</span>
                  {f.required && <span style={{ fontSize:9, color:'var(--muted)', marginLeft:'auto' }}>påkrevd</span>}
                </div>
              ))}
            </div>

            <div {...grp}>
              <label className="field-label">Cookie-varighet (dager)</label>
              <input {...inp} type="number" value={config.cookieDays} min={0} max={365}
                onChange={e=>upd('cookieDays', parseInt(e.target.value)||0)} />
              <div style={{ fontSize:10, color:'var(--muted)', marginTop:4 }}>0 = alltid vis (testing)</div>
            </div>
          </>}

          {btab === 'tekst' && <>
            {[
              { key:'clientId',    label:'Kunde-ID (hostname)' },
              { key:'label',       label:'Label (liten tekst øverst)' },
              { key:'heading',     label:'Overskrift' },
              { key:'subtext',     label:'Undertekst', multi:true },
              { key:'buttonText',  label:'Knapptekst' },
              { key:'successTitle',label:'Suksess-overskrift' },
              { key:'successText', label:'Suksess-tekst' },
              { key:'successRedirectUrl', label:'Redirect-URL etter suksess (valgfritt)' },
            ].map(({key,label,multi}) => (
              <div key={key} {...grp}>
                <label className="field-label">{label}</label>
                {multi
                  ? <textarea {...inp} rows={3} value={config[key]} onChange={e=>upd(key,e.target.value)} />
                  : <input {...inp} type="text" value={config[key]} onChange={e=>upd(key,e.target.value)} />
                }
              </div>
            ))}
          </>}

          {btab === 'integrasjon' && <>
            <div style={{ padding:'12px', background:'var(--surface2)', border:'1px solid var(--border)', marginBottom:12 }}>
              <div style={{ fontSize:9, fontWeight:800, letterSpacing:'.16em', color:'var(--red)', marginBottom:8, textTransform:'uppercase' }}>Supabase (aktiv)</div>
              <div style={{ fontSize:11, color:'var(--muted)', lineHeight:1.6, fontFamily:'var(--mono)' }}>
                {SUPABASE_URL.replace('https://','')}<br />
                <span style={{ color:'#16a34a' }}>✓ Leads lagres automatisk</span>
              </div>
            </div>

            <div {...grp}>
              <label className="field-label">Google Sheets URL (backup)</label>
              <input {...inp} type="text" value={config.sheetsUrl}
                onChange={e=>upd('sheetsUrl',e.target.value)}
                placeholder="https://script.google.com/macros/s/..." />
            </div>

            <div style={{ marginTop:16, padding:'10px 12px', background:'#f0fdf4', border:'1px solid #bbf7d0' }}>
              <div style={{ fontSize:9, fontWeight:800, letterSpacing:'.12em', color:'#16a34a', marginBottom:6 }}>STACK</div>
              <div style={{ fontSize:11, color:'var(--muted)', lineHeight:1.8 }}>
                ✓ leadpop.js → GitHub Pages<br/>
                ✓ Supabase leads-tabell + RLS<br/>
                ✓ client_id per kunde
              </div>
            </div>
          </>}
        </div>
      </div>

      {/* Preview + code */}
      <div className="builder-main">
        <div className="preview-area">
          <div className="preview-grid" />
          <PopupPreview config={config} />
        </div>

        <div className="code-footer">
          <div className="code-footer-header">
            <span className="code-footer-label">GTM Custom HTML — klar til bruk</span>
            <CopyBtn text={gtm} />
          </div>
          <pre className="code-block">{gtm}</pre>
        </div>
      </div>
    </div>
  );
}

// ─── APP SHELL ──────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('customers');
  const [editingCustomer, setEditingCustomer] = useState(null);
  const { customers, addCustomer, updateCustomer, deleteCustomer } = useCustomers();
  const [leads, setLeads] = useState([]);

  const handleOpenBuilder = (customer) => {
    setEditingCustomer(customer);
    setTab('builder');
  };

  const handleSave = (config) => {
    if (editingCustomer) {
      updateCustomer(editingCustomer.id, config);
      setEditingCustomer(c => ({ ...c, config }));
    }
  };

  const handleBack = () => {
    setEditingCustomer(null);
    setTab('customers');
  };

  return (
    <div style={{ height:'100vh', display:'flex', flexDirection:'column' }}>
      <div className="topnav">
        <div className="logo">Uppit <span className="logo-sep">|</span><span>LeadPop Hub</span></div>
        <div className="nav-tabs">
          {[
            { id:'customers', label:'Kunder',       icon:'👥' },
            { id:'test',      label:'Test & Leads', icon:'📋' },
            { id:'builder',   label:'Popup Builder', icon:'🎨' },
          ].map(t => (
            <button key={t.id} className={`nav-tab${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)}>
              <span className="tab-icon">{t.icon}</span>
              {t.label}
            </button>
          ))}
        </div>
        <div className="status-badge">
          <div className="status-dot" />
          <span className="status-text">Supabase live</span>
        </div>
      </div>

      <div className="panels" style={{ position:'relative' }}>
        <div style={{ display: tab === 'customers' ? 'contents' : 'none' }}>
          <CustomerPanel onOpenBuilder={handleOpenBuilder} customers={customers} addCustomer={addCustomer} deleteCustomer={deleteCustomer} />
        </div>
        <div style={{ display: tab === 'test' ? 'contents' : 'none' }}>
          <TestPanel onLeadsLoaded={setLeads} />
        </div>
        <div style={{ display: tab === 'builder' ? 'contents' : 'none' }}>
          <BuilderPanel customer={editingCustomer} onSave={handleSave} onBack={handleBack} />
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
